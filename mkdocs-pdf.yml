# PDF build overlay for MkDocs

INHERIT: mkdocs.yml

plugins:
  - search
  - bibtex:
      bib_file: "docs/refs.bib"
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            heading_level: 3
  - with-pdf:
      output_path: pdf/lst-tools-documentation.pdf
      custom_template_path: templates
      author: Christoph Hader
      copyright: BSD-3-Clause
      cover_subtitle: Linear Stability Theory Utilities
