# BSD-3-Clause License - see LICENSE file
name: Documentation

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PDF system dependencies
        # cache apt packages between runs; without this, `apt-get update`
        # alone takes ~2 min on GitHub-hosted runners because it refreshes
        # all preconfigured mirrors (azure, microsoft, chrome, google).
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            libcairo2
            libpango-1.0-0
            libpangocairo-1.0-0
            libgdk-pixbuf-2.0-0
            libffi-dev
            shared-mime-info
          version: 1.0

      - name: Install dependencies
        run: |
          pip install -e .[docs]

      - name: Build documentation
        run: |
          # keep strict validation for normal site content and links
          mkdocs build --strict

          # build PDF overlay separately; mkdocs-with-pdf escalates warnings
          # to hard failures when strict mode is enabled
          mkdocs build -f mkdocs-pdf.yml

      - name: Create versioned PDF filename on release tags
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp \
            site/pdf/lst-tools-documentation.pdf \
            "site/pdf/lst-tools-${GITHUB_REF_NAME}.pdf"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
