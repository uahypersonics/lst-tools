name: Documentation

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDF system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Install dependencies
        run: |
          pip install -e .[docs]

      - name: Build documentation
        run: |
          # keep strict validation for normal site content and links
          mkdocs build --strict

          # build PDF overlay separately; mkdocs-with-pdf escalates warnings
          # to hard failures when strict mode is enabled
          mkdocs build -f mkdocs-pdf.yml

      - name: Create versioned PDF filename on release tags
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp \
            site/pdf/lst-tools-documentation.pdf \
            "site/pdf/lst-tools-${GITHUB_REF_NAME}.pdf"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
