input_file = "mock.hdf5"
debug = false
lst_exe = "lst.x"

[flow_conditions]
mach = 0.8
re1 = 1e6
gamma = 1.4
cp = 1005.025
cv = 717.875
rgas = 287.15
pres_0 = 101325.0
temp_0 = 288.15
pres_inf = 101325.0
temp_inf = 288.15
dens_inf = 1.225
uvel_inf = 0.0
visc_law = 0

[geometry]
type = 3          
theta_deg = 5.0
r_nose = 1.25e-3
l_ref = 1.0
is_body_fitted = false

[meanflow_conversion]
i_s = 0
i_e = 150
d_i = 1
set_v_zero = true

[lst.solver]
type = 1            # 1 = compressible
is_simplified = true
alpha_i_threshold = -100.0
generalized = 1
spatial_temporal = 1
energy_formulation = 1

[lst.options]
geometry_switch = 1   # 0 = cone
longitudinal_curvature = 1

[lst.params]
ny = 150
yl_in = 0.0
tol_lst = 1e-05
max_iter = 15
x_s = 0.001
x_e = 0.75
i_step = 1
f_min = 10000
f_max = 500000
d_f = 10000
f_init = 100000
beta_s = 0
beta_e = 100
d_beta = 5
beta_init = 0.0
alpha_0 = "(0,0)"

[lst.io]
baseflow_input = "meanflow.bin"
solution_output = "growth_rate.dat"

[hpc]
account = ""
nodes = ""
time = ""
partition = ""

[plotting]
cmap = "viridis"
levels = 50
save = ""
colorbar_label = ""
equal_aspect = true