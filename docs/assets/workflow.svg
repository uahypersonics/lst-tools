<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="420" viewBox="0 0 1420 420">
    <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="6.2" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#5d738a" />
        </marker>
    </defs>
    <!-- outer frame -->
    <rect x="1" y="1" width="1418" height="418" rx="24" fill="#f8fafc" stroke="#d6e0ea" stroke-width="1.2" />

    <!-- Phase 1: Initialization and Meanflow Preparation -->
    <rect x="22" y="58" width="384" height="300" rx="20" fill="#ffffff" stroke="#d6e0ea" stroke-width="1.1" />
    <text x="214.0" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="600" fill="#64748b">Initialization and</text>
    <text x="214.0" y="96" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="600" fill="#64748b">Meanflow Preparation</text>
    <!-- initialization box -->
    <rect x="40" y="186" width="146" height="70" rx="16" fill="#dcecff" stroke="#b7c6d6" stroke-width="1.4" />
    <text x="113.0" y="213" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#233142">initialization</text>
    <text x="113.0" y="242" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#64748b">create lst.cfg</text>
    <!-- extract box (optional) -->
    <rect x="40" y="286" width="146" height="60" rx="16" fill="#f3f6fa" stroke="#b7c6d6" stroke-width="1.4" stroke-dasharray="7 5" />
    <text x="113.0" y="309" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#233142">extract</text>
    <text x="113.0" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#64748b">CFD mesh to HDF5</text>
    <!-- meanflow preparation box -->
    <rect x="220" y="186" width="146" height="70" rx="16" fill="#dcecff" stroke="#b7c6d6" stroke-width="1.4" />
    <text x="293.0" y="209" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#233142">meanflow</text>
    <text x="293.0" y="226" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#233142">preparation</text>
    <text x="293.0" y="242" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#64748b">write meanflow.bin</text>

    <!-- Phase 2: Setup Runs -->
    <rect x="442" y="58" width="470" height="300" rx="20" fill="#ffffff" stroke="#d6e0ea" stroke-width="1.1" />
    <text x="677.0" y="82" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#64748b">Setup Runs</text>
    <!-- setup parsing box -->
    <rect x="470" y="96" width="146" height="70" rx="16" fill="#dcecff" stroke="#b7c6d6" stroke-width="1.4" />
    <text x="543.0" y="119" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#233142">setup</text>
    <text x="543.0" y="136" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#233142">parsing</text>
    <text x="543.0" y="152" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#64748b">broad instability sweep</text>
    <!-- setup spectra box (optional) -->
    <rect x="470" y="276" width="146" height="70" rx="16" fill="#f3f6fa" stroke="#b7c6d6" stroke-width="1.4" stroke-dasharray="7 5" />
    <text x="543.0" y="299" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#233142">setup</text>
    <text x="543.0" y="316" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#233142">spectra</text>
    <text x="543.0" y="332" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#64748b">fixed-station branch</text>
    <!-- setup tracking box -->
    <rect x="690" y="96" width="146" height="70" rx="16" fill="#e5f5ea" stroke="#b7c6d6" stroke-width="1.4" />
    <text x="763.0" y="119" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#233142">setup</text>
    <text x="763.0" y="136" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#233142">tracking</text>
    <text x="763.0" y="152" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#64748b">requires parsing</text>
    <!-- seed_alpha badge -->
    <rect x="639" y="180" width="248" height="26" rx="13" fill="#edf7f0" stroke="#b7d8c0" stroke-width="1.1" />
    <text x="763.0" y="197" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" font-weight="600" fill="#2f5f45">writes seed_alpha.dat when enabled</text>

    <!-- Phase 3: LST Solver -->
    <rect x="928" y="58" width="190" height="300" rx="20" fill="#ffffff" stroke="#d6e0ea" stroke-width="1.1" />
    <text x="1023.0" y="82" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#64748b">LST Solver</text>
    <!-- lst.x box -->
    <rect x="950" y="186" width="146" height="70" rx="16" fill="#f0f2f5" stroke="#b7c6d6" stroke-width="1.4" />
    <text x="1023.0" y="213" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#233142">lst.x</text>
    <text x="1023.0" y="234" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#64748b">run solver</text>

    <!-- Phase 4: Postprocessing and Cleanup -->
    <rect x="1134" y="58" width="268" height="300" rx="20" fill="#ffffff" stroke="#d6e0ea" stroke-width="1.1" />
    <text x="1268.0" y="82" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#64748b">Postprocessing and Cleanup</text>
    <!-- visualization box -->
    <rect x="1182" y="96" width="146" height="70" rx="16" fill="#dcecff" stroke="#b7c6d6" stroke-width="1.4" />
    <text x="1255.0" y="123" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#233142">visualization</text>
    <text x="1255.0" y="152" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#64748b">from parsing</text>
    <text x="1255.0" y="164" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#64748b">or tracking</text>
    <!-- processing box -->
    <rect x="1182" y="186" width="146" height="70" rx="16" fill="#dcecff" stroke="#b7c6d6" stroke-width="1.4" />
    <text x="1255.0" y="213" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#233142">processing</text>
    <text x="1255.0" y="242" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#64748b">from tracking</text>
    <text x="1255.0" y="254" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#64748b">or spectra</text>
    <!-- cleaning box -->
    <rect x="1182" y="276" width="146" height="70" rx="16" fill="#dcecff" stroke="#b7c6d6" stroke-width="1.4" />
    <text x="1255.0" y="303" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#233142">cleaning</text>
    <text x="1255.0" y="332" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#64748b">remove generated</text>
    <text x="1255.0" y="344" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#64748b">artifacts</text>

    <!-- ARROWS -->
    <!-- init → meanflow -->
    <line x1="186" y1="221" x2="220" y2="221" stroke="#5d738a" stroke-width="2.4" marker-end="url(#arrowhead)" />
    <!-- extract → meanflow (dashed) -->
    <path d="M 186 316 L 210 316 L 210 221 L 220 221" fill="none" stroke="#5d738a" stroke-width="2.4" stroke-dasharray="7 5" marker-end="url(#arrowhead)" />
    <!-- meanflow → setup parsing -->
    <path d="M 366.0 221.0 L 446.0 221.0 L 446.0 131.0 L 470.0 131.0" fill="none" stroke="#5d738a" stroke-width="2.4" marker-end="url(#arrowhead)" />
    <!-- meanflow → setup spectra (dashed) -->
    <path d="M 366.0 221.0 L 446.0 221.0 L 446.0 311.0 L 470.0 311.0" fill="none" stroke="#5d738a" stroke-width="2.4" stroke-dasharray="7 5" marker-end="url(#arrowhead)" />
    <!-- setup parsing → setup tracking -->
    <line x1="616" y1="131" x2="690" y2="131" stroke="#5d738a" stroke-width="2.4" marker-end="url(#arrowhead)" />
    <!-- setup tracking → lst.x -->
    <path d="M 836 131 L 912 131 L 912 221 L 950 221" fill="none" stroke="#5d738a" stroke-width="2.4" marker-end="url(#arrowhead)" />
    <!-- setup spectra → lst.x (dashed) -->
    <path d="M 616 311 L 912 311 L 912 226 L 950 226" fill="none" stroke="#5d738a" stroke-width="2.4" stroke-dasharray="7 5" marker-end="url(#arrowhead)" />
    <!-- lst.x → processing -->
    <line x1="1096" y1="221" x2="1182" y2="221" stroke="#5d738a" stroke-width="2.4" marker-end="url(#arrowhead)" />
</svg>
